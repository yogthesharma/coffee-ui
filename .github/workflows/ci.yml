name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck UI
        run: pnpm exec tsc -p packages/ui --noEmit

      - name: Typecheck playground
        run: pnpm exec tsc -p apps/playground --noEmit

      - name: Build Storybook
        run: pnpm --filter @coffee-ui/playground run build-storybook
